name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: srikanthsistu-website
  DATA_BUCKET: ${{ secrets.GCP_DATA_BUCKET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          cat > env.yaml <<'ENVEOF'
          DATA_DIR: /data
          SITE_NAME: "srikanthsistu website"
          SITE_TAGLINE: "writing, systems & photography"
          SITE_LOCATION: Lisbon
          SITE_GITHUB: https://github.com/sistusrikanth
          ENVEOF
          echo "ADMIN_PASSWORD: \"${{ secrets.ADMIN_PASSWORD }}\"" >> env.yaml
          echo "ADMIN_SECRET_KEY: \"${{ secrets.ADMIN_SECRET_KEY }}\"" >> env.yaml
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --add-volume name=data,type=cloud-storage,bucket=${{ env.DATA_BUCKET }} \
            --add-volume-mount volume=data,mount-path=/data \
            --env-vars-file env.yaml
